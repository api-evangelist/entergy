aid: entergy
name: Entergy
description: >-
  Entergy Corporation is an integrated energy company headquartered in New Orleans,
  Louisiana, providing electricity to more than 3 million utility customers across
  Arkansas, Louisiana, Mississippi, and Texas. The company operates power
  generation, transmission, and distribution infrastructure including nuclear,
  renewable, and hydroelectric resources. While Entergy does not publish a public
  developer API portal, it operates customer-facing digital tools (myEntergy
  account portal, outage map, energy efficiency toolkit) that interact with
  internal systems via private APIs.
